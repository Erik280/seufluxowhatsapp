version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: whatsapp_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - network
    depends_on: []
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: whatsapp_frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      - network
    depends_on:
      - api
    volumes:
      - ./frontend:/app/frontend

networks:
  network:
    external: true
