version: "3.7"

services:
  # --- Backend (API FastAPI) ---
  api:
    image: seufluxowhatsapp-api:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    networks:
      - network
    # Os volumes do .env foram removidos para evitar erros de deploy no Swarm.
    # Adicione as variáveis do .env diretamente no painel Environment Variables do Portainer.
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        # Prioridade maior para a API (PathPrefix)
        - traefik.http.routers.seufluxo_api.priority=20
        - traefik.http.routers.seufluxo_api.rule=Host(`seufluxowhatsapp.transformafuturo.com.br`) && (PathPrefix(`/webhook`) || PathPrefix(`/docs`) || PathPrefix(`/redoc`) || PathPrefix(`/auth`) || PathPrefix(`/contacts`) || PathPrefix(`/messages`) || PathPrefix(`/broadcasts`) || PathPrefix(`/admin`))
        - traefik.http.routers.seufluxo_api.entrypoints=websecure
        - traefik.http.routers.seufluxo_api.tls.certresolver=letsencryptresolver
        - traefik.http.services.seufluxo_api.loadbalancer.server.port=8000
        - traefik.http.services.seufluxo_api.loadbalancer.passHostHeader=true

  # --- Frontend (Interface Flet) ---
  frontend:
    image: seufluxowhatsapp-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    networks:
      - network
    depends_on:
      - api
    environment:
      - BACKEND_URL=http://api:8000
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        # Prioridade menor para a interface (Catch-all do Host)
        - traefik.http.routers.seufluxo_front.priority=10
        - traefik.http.routers.seufluxo_front.rule=Host(`seufluxowhatsapp.transformafuturo.com.br`)
        - traefik.http.routers.seufluxo_front.entrypoints=websecure
        - traefik.http.routers.seufluxo_front.tls.certresolver=letsencryptresolver
        - traefik.http.services.seufluxo_front.loadbalancer.server.port=8080
        - traefik.http.services.seufluxo_front.loadbalancer.passHostHeader=true

networks:
  network:
    external: true
    name: network
